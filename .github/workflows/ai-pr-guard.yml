name: AI PR Guard

on:
  pull_request:
    branches:
      - ai/integration
      - master

permissions:
  contents: read

concurrency:
  group: ai-pr-guard-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  freshness:
    name: Freshness Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure PR branch includes latest base
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF="origin/${{ github.base_ref }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git fetch origin "${{ github.base_ref }}"
          MERGE_BASE="$(git merge-base "$BASE_REF" "$HEAD_SHA")"
          BASE_SHA="$(git rev-parse "$BASE_REF")"
          if [ "$MERGE_BASE" != "$BASE_SHA" ]; then
            echo "PR branch is stale. Merge or rebase the latest base branch first."
            echo "Expected base: $BASE_REF"
            exit 1
          fi
